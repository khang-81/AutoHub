server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    client_max_body_size 6m;

    # API Spring Boot (Docker): trình duyệt gọi /api/* cùng cổng với web → không cần mở host :8081
    location /api/ {
        proxy_pass http://api:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 15s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location /v3/ {
        proxy_pass http://api:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Không fallback SPA cho ảnh/manifest — nếu thiếu file, trả 404 thật (tránh HTML làm hỏng PWA icon).
    location ~* \.(?:png|jpe?g|gif|ico|svg|webp|woff2?|json|webmanifest)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

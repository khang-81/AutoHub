# Rent-A-Car: SQL Server + API (profile prod). Sao chép docker-compose.env.example -> .env
# Chạy: docker compose up --build
# Lần đầu build db-init có thể mất vài phút (cài mssql-tools18).

name: rentacar

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
    ports:
      - "${MSSQL_PORT:-1433}:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "pgrep sqlservr || exit 1"]
      interval: 5s
      retries: 36
      start_period: 45s

  db-init:
    build:
      context: ./docker/sqlserver-init
    platform: linux/amd64
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
    restart: "no"

  api:
    build:
      context: ./backend/rentACar
    platform: linux/amd64
    ports:
      - "${API_PORT:-8081}:8081"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:sqlserver://db:1433;databaseName=rentacar;encrypt=false;trustServerCertificate=true
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: ${MSSQL_SA_PASSWORD}
      JWT_KEY: ${JWT_KEY}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-update}
      APP_UPLOAD_ROOT: /app/uploads
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db-init:
        condition: service_completed_successfully

  web:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8081}
    platform: linux/amd64
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      - api

volumes:
  mssql_data:
  uploads_data:

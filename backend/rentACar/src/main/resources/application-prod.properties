# Production profile — bí mật qua biến môi trường (không commit giá trị thật).
# Chạy: SPRING_PROFILES_ACTIVE=prod   hoặc   java -jar app.jar --spring.profiles.active=prod
#
# Bắt buộc: SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD,
#           JWT_KEY, APP_CORS_ALLOWED_ORIGINS

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

jwt.key=${JWT_KEY}
jwt.expiration=${JWT_EXPIRATION:86400000}

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS}

mail.username=${MAIL_USERNAME:}
mail.password=${MAIL_PASSWORD:}

gemini.api.key=${GEMINI_API_KEY:}
gemini.api.base-url=${GEMINI_API_BASE_URL:https://generativelanguage.googleapis.com}

app.upload.root=${APP_UPLOAD_ROOT:uploads}

# Lần đầu triển khai DB trống có thể cần update; sau đó nên validate/none
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}

server.port=${PORT:8081}
# Bắt buộc trong Docker: lắng nghe mọi interface (Nginx gọi qua tên service api:8081)
server.address=0.0.0.0

logging.level.root=${LOG_LEVEL_ROOT:WARN}
logging.level.com.tobeto.rentACar=${LOG_LEVEL_APP:INFO}

# Actuator: chỉ health + info; không lộ env/beans
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# =====================================================
# AutoHub - Rent A Car Application Configuration
# =====================================================
# Không đưa mật khẩu/API key thật lên Git — dùng biến môi trường hoặc application-local.properties (đã gitignore).
# Local dev: mặc định không cần profile.
# Production: SPRING_PROFILES_ACTIVE=prod — xem application-prod.properties và env.example

spring.config.import=optional:classpath:application-local.properties

# Server
server.port=8081

# CORS — comma-separated browser origins allowed to call this API (must match your frontend URL, no path)
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000,http://localhost:3001,http://localhost:3002,http://127.0.0.1:5173,http://127.0.0.1:3000,http://localhost:8080,http://127.0.0.1:8080

# Database - SQL Server (override bằng SPRING_DATASOURCE_* khi deploy)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:sqlserver://localhost;databaseName=rentacar;encrypt=false;trustServerCertificate=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:12345678}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT — dùng JWT_KEY trong env khi deploy; default chỉ cho dev
jwt.key=${JWT_KEY:QXV0b0h1YkBSZW50QUNhciNTZWNyZXRLZXkhMjAyNCQ=}
jwt.expiration=86400000

# Mail — đặt MAIL_USERNAME / MAIL_PASSWORD (vd. Gmail App Password) hoặc application-local.properties
mail.username=${MAIL_USERNAME:}
mail.password=${MAIL_PASSWORD:}

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Logging
logging.level.root=WARN
logging.level.com.tobeto.rentACar=INFO
logging.level.org.springframework.security=WARN

# Gemini AI — GEMINI_API_KEY trong env (không commit key)
gemini.api.base-url=${GEMINI_API_BASE_URL:https://generativelanguage.googleapis.com}
gemini.api.key=${GEMINI_API_KEY:}

# KYC file uploads (relative to working directory when running locally)
app.upload.root=uploads

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB
